<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Presenter - Control Panel</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #5c6bc0; --bg: #f0f2f5; --card-bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: var(--secondary); margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        
        .btn-open { background: #6c757d; color: white; flex: 1; }
        .btn-show { background: var(--primary); color: white; flex: 2; }
        .btn-donate { background: #e91e63; color: white; }
        .btn-rest { background: #673ab7; color: white; } 
        .btn-hert { background: #009688; color: white; } /* Стиль для Поочередности */
        .btn-clear { background: #37474f; color: white; margin-top: 10px; } /* Стиль для Очистки */
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .switch-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>
<div class="container">
    <h2>Bible Presenter</h2>
    <select id="book"><option>Загрузка книг...</option></select>
    <div class="row">
        <input type="number" id="chapter" placeholder="Глава" value="1">
        <input type="text" id="verse" placeholder="Стих (напр. 5 или 5-10)">
    </div>
    <div class="switch-container">
        <span>Русский язык</span>
        <label class="switch"><input type="checkbox" id="showRu" checked><span class="slider"></span></label>
    </div>
    <div class="controls">
        <div class="row">
            <button class="btn-open" onclick="openScreen()">Экран</button>
            <button class="btn-show" onclick="showVerse()">ПОКАЗАТЬ</button>
        </div>
        <div class="row">
            <button class="btn-donate" onclick="showDonate()">ԶՈՀ</button>
            <button class="btn-rest" onclick="showRestaurants()">Ռեստորաններ</button>
            <button class="btn-hert" onclick="showHert()">Հերթականություն</button>
        </div>
        <button class="btn-clear" onclick="clearScreen()">ОЧИСТИТЬ ЭКРАН</button>
    </div>
</div>

<script>
const bookNamesMap = {
    "Genesis": ["Бытие", "Ծննդոց"], "Exodus": ["Исход", "Ելք"], "Leviticus": ["Левит", "Ղևտական"],
    "Numbers": ["Числа", "Թվեր"], "Deuteronomy": ["Второзаконие", "Երկրորդ Օրենք"], "Joshua": ["Иисус Навин", "Հեսու"],
    "Judges": ["Судьи", "Դատավորներ"], "Ruth": ["Руфь", "Հռութ"], "1 Samuel": ["1 Царств", "Ա Թագավորություններ"],
    "2 Samuel": ["2 Царств", "Բ Թագավորություններ"], "1 Kings": ["3 Царств", "Գ Թագավորություններ"],
    "2 Kings": ["4 Царств", "Դ Թագավորություններ"], "1 Chronicles": ["1 Паралипоменон", "Ա Մնացորդաց"],
    "2 Chronicles": ["2 Паралипоменон", "Բ Մնացորդաց"], "Ezra": ["Ездра", "Եզրաս"], "Nehemiah": ["Неемия", "Նեեմի"],
    "Esther": ["Есфирь", "Եսթер"], "Job": ["Иов", "Հոբ"], "Psalms": ["Псалтирь", "Սաղմոսներ"],
    "Proverbs": ["Притчи", "Առակներ"], "Ecclesiastes": ["Екклесиаст", "Ժողովող"], "Song of Solomon": ["Песня Песней", "Երգ Եрգոց"],
    "Isaiah": ["Исаия", "Եսայի"], "Jeremiah": ["Иеремия", "Երեմիа"], "Lamentations": ["Плач Иеремии", "Ողբ"],
    "Ezekiel": ["Иезекииль", "Եզեկիել"], "Daniel": ["Даниил", "Դանիել"], "Hosea": ["Осия", "Ովսեե"],
    "Joel": ["Иоиль", "Հովել"], "Amos": ["Աмос", "Ամոս"], "Obadiah": ["Աвдий", "Աբդիու"],
    "Jonah": ["Иона", "Հովնան"], "Micah": ["Михей", "Միքիա"], "Nahum": ["Наум", "Նավում"],
    "Habakkuk": ["Աввакум", "Ամբակում"], "Zephaniah": ["Софония", "Սոփոնիа"], "Haggai": ["Աггей", "Անգե"],
    "Zechariah": ["Захария", "Զաքարիա"], "Malachi": ["Малахия", "Մաղաքիա"], "Matthew": ["Матфея", "Մատթեոս"],
    "Mark": ["Марка", "Մարկոս"], "Luke": ["Луки", "Ղուկաս"], "John": ["Иоанна", "Հովհաննես"],
    "Acts": ["Деяния", "Գործք Առաքելոց"], "Romans": ["Римлянам", "Հռոմեացիներին"], "1 Corinthians": ["1 Коринфянам", "Ա Կորնթացիներին"],
    "2 Corinthians": ["2 Коринфянам", "Բ Կորնթացիներին"], "Galatians": ["Галатам", "Գաղատացիներին"], "Ephesians": ["Ефесянам", "Եփեսացիներին"],
    "Philippians": ["Филиппийцам", "Փիլիպպեցիներին"], "Colossians": ["Колоссянам", "Կողոսացիներին"], "1 Thessalonians": ["1 Фессалоникийцам", "Ա Թեսաղոնիկեցիներին"],
    "2 Thessalonians": ["2 Фессалоникийцам", "Բ Թեսաղոնիկեցիներին"], "1 Timothy": ["1 Тимофею", "Ա Տիմոթեոս"],
    "2 Timothy": ["2 Тимофею", "Բ Տիմոթեոս"], "Titus": ["Титу", "Տիտոս"], "Philemon": ["Филимону", "Փիլիմոն"],
    "Hebrews": ["Евреям", "Եբրայեցիներին"], "James": ["Иакова", "Հակոբոս"], "1 Peter": ["1 Петра", "Ա Պետրոս"],
    "2 Peter": ["2 Петра", "Բ Պետրոս"], "1 John": ["1 Иоанна", "Ա Հովհաննես"], "2 John": ["2 Иоанна", "Բ Հովհաննես"],
    "3 John": ["3 Иоанна", "Գ Հովհաննես"], "Jude": ["Иуды", "Հուդա"], "Revelation": ["Откровение", "Հայտնություն"]
};

let ruBible, hyBible, screenWindow;

async function loadBible(){
    try {
        const rRes = await fetch("bible/ru_synodal.json");
        ruBible = await rRes.json();
        const hRes = await fetch("bible/ArmEastern_fixed.json");
        hyBible = await hRes.json();
        const select = document.getElementById("book");
        select.innerHTML = ""; 
        ruBible.forEach((book, i) => {
            let names = bookNamesMap[book.name] || [book.name, hyBible[i]?.name || book.name];
            let option = document.createElement("option");
            option.value = i;
            option.text = `${names[0]} / ${names[1]}`;
            select.appendChild(option);
        });
    } catch (e) { console.error(e); }
}
loadBible();

function ensureScreen() {
    if(!screenWindow || screenWindow.closed) screenWindow = window.open("screen.html", "screen");
}

function openScreen(){ screenWindow = window.open("screen.html", "screen"); }

function showVerse(){
    ensureScreen();
    const bookSelect = document.getElementById("book");
    const chapter = parseInt(document.getElementById("chapter").value);
    const verseInput = document.getElementById("verse").value;
    const isRuEnabled = document.getElementById("showRu").checked;
    let start, end;
    if(verseInput.includes("-")){ let p = verseInput.split("-"); start = parseInt(p[0]); end = parseInt(p[1]); }
    else { start = parseInt(verseInput); end = start; }
    const parts = bookSelect.options[bookSelect.selectedIndex].text.split(" / ");
    let ruVerses = [], hyVerses = [];
    for(let i = start; i <= end; i++){
        let rv = ruBible[bookSelect.value]?.chapters?.[chapter-1]?.[i-1];
        let hv = hyBible[bookSelect.value]?.chapters?.[chapter-1]?.[i-1];
        if(isRuEnabled && rv) ruVerses.push(rv.text || rv);
        if(hv) hyVerses.push(hv.text || hv);
    }
    screenWindow.postMessage({ type: "verse", ruBook: isRuEnabled ? parts[0] : null, hyBook: parts[1], chapter, start, end, ru: ruVerses, hy: hyVerses }, "*");
}

function showDonate(){
    ensureScreen();
    screenWindow.postMessage({ type: "donate" }, "*");
}

function showRestaurants(){
    ensureScreen();
    screenWindow.postMessage({ type: "image", src: "restoranner.png", title: "Ռեստորաններ / Рестораны" }, "*");
}

function showHert(){
    ensureScreen();
    screenWindow.postMessage({ type: "image", src: "qr_hertakanutyun.png", title: "Հերթականություն / Поочередность" }, "*");
}

function clearScreen() {
    ensureScreen();
    screenWindow.postMessage({ type: "clear" }, "*");
}
</script>
</body>
</html>
