<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* ФОН ПО УМОЛЧАНИЮ (ТВОЯ КАРТИНКА) */
            background: url('fon.png') no-repeat center center fixed; 
            background-size: cover;
            transition: background 0.3s ease;
        }

        /* Класс для черного фона */
        body.black-mode { background: #000 !important; }

        .container { width: 90%; text-align: center; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        
        #hy-block { font-size: 5vh; font-weight: bold; margin-bottom: 25px; line-height: 1.4; }
        #ru-block { font-size: 3.5vh; color: #ddd; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 25px; line-height: 1.4; }
        
        /* ЦВЕТ ТЕКСТА ПО УМОЛЧАНИЮ (ЕСЛИ КАРТИНКА) - ЧЕРНЫЙ */
        #hy-block, #ru-block, #ref { color: #000 !important; text-shadow: 1px 1px 3px rgba(255,255,255,0.5); }
        .v-num { font-size: 0.7em; color: #ffd700; margin-right: 10px; font-weight: normal; font-style: italic; }

        /* ЦВЕТ ТЕКСТА ЕСЛИ ЧЕРНЫЙ ФОН - БЕЛЫЙ */
        body.black-mode #hy-block { color: #fff !important; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        body.black-mode #ru-block { color: #ddd !important; }
        body.black-mode #ref { color: #ffd700 !important; }

        /* Скрыть русский блок */
        .hidden { display: none !important; }

        #ref { font-size: 3vh; margin-top: 35px; color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="hy-block"></div>
        <div id="ru-block"></div>
        <div id="ref"></div>
    </div>

    <script>
        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data) return;

            // 1. Управляем фоном
            if (data.blackBg) {
                document.body.classList.add('black-mode');
            } else {
                document.body.classList.remove('black-mode');
            }

            // 2. Управляем русским текстом
            const ruBlock = document.getElementById("ru-block");
            if (data.showRu) {
                ruBlock.classList.remove('hidden');
            } else {
                ruBlock.classList.add('hidden');
            }

            // 3. Вывод армянского (всегда)
            let hyHTML = "";
            data.hy.forEach(v => {
                hyHTML += `<span><span class="v-num">${v.verse}</span>${v.text}</span> `;
            });
            document.getElementById("hy-block").innerHTML = hyHTML;

            // 4. Вывод русского (если включен)
            let ruHTML = "";
            data.ru.forEach(v => {
                ruHTML += `<span><span class="v-num">${v.verse}</span>${v.text}</span> `;
            });
            document.getElementById("ru-block").innerHTML = ruHTML;

            // 5. Динамическая ссылка внизу
            let refText = "";
            if (data.showRu) {
                refText = `${data.hyBook} ${data.chapter}:${data.start} / ${data.ruBook} ${data.chapter}:${data.start}`;
            } else {
                refText = `${data.hyBook} ${data.chapter}:${data.start}`;
            }
            document.getElementById("ref").innerText = refText;
        });
    </script>
</body>
</html>
