<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: url("fon.png") no-repeat center center fixed; background-size: cover; font-family: Georgia, serif; }
        #main-display { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; }
        #reference { font-size: 50px; font-weight: bold; color: #1a1a1a; text-align: center; margin-bottom: 20px; text-shadow: 1px 1px 2px white; flex-shrink: 0; min-height: 60px; }
        #content-wrapper { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        .text-block { width: 100%; line-height: 1.2; word-wrap: break-word; color: black; display: none; }
        #ru { font-style: italic; color: #333; margin-bottom: 0.4em; }
        #hy { font-weight: 500; }
        #donate { white-space: pre-line; font-family: sans-serif; font-weight: bold; }
        
        /* СТИЛЬ ДЛЯ КАРТИНКИ */
        #img-block { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }
        #img-block img { max-width: 85%; max-height: 75%; object-fit: contain; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: white; padding: 10px; }
    </style>
</head>
<body>

<div id="main-display">
    <div id="reference"></div>
    <div id="content-wrapper">
        <div id="ru" class="text-block"></div>
        <div id="hy" class="text-block"></div>
        <div id="donate" class="text-block"></div>
        <div id="img-block"><img id="pic" src=""></div>
    </div>
</div>

<script>
function autoFitText() {
    const wrapper = document.getElementById("content-wrapper");
    const blocks = [document.getElementById("ru"), document.getElementById("hy"), document.getElementById("donate")].filter(el => el.style.display !== 'none');
    if (blocks.length === 0) return;
    let size = 10, maxSize = 400;
    for (let s = 10; s <= maxSize; s += 1) {
        blocks.forEach(el => el.style.fontSize = s + "px");
        if (wrapper.scrollHeight > wrapper.clientHeight || wrapper.scrollWidth > wrapper.clientWidth) { size = s - 1; break; }
        size = s;
    }
    blocks.forEach(el => el.style.fontSize = size + "px");
}

window.addEventListener("message", function(e) {
    const d = e.data;
    const ref = document.getElementById("reference");
    const ru = document.getElementById("ru"), hy = document.getElementById("hy"), don = document.getElementById("donate");
    const ib = document.getElementById("img-block"), pic = document.getElementById("pic");

    // 1. Скрываем вообще всё по умолчанию
    [ru, hy, don, ib].forEach(el => el.style.display = "none");
    ref.innerText = "";

    // Обработка кнопки "ОЧИСТИТЬ"
    if (d.type === "clear") {
        return; // Просто выходим, так как мы уже всё скрыли выше
    }

    // 2. Если это КАРТИНКА (Рестораны или Поочередность)
    if (d.type === "image") {
        pic.src = d.src + "?t=" + new Date().getTime();
        ref.innerText = d.title || "";
        ib.style.display = "flex";
        return;
    }

    // 3. Если это ПОЖЕРТВОВАНИЕ
    if (d.type === "donate") {
        ref.innerText = "📍 Пожертвование / ԶՈՀ";
        don.innerText = `Драгоценные братья и сестры, вы можете совершить добровольное пожертвование на карты:\n\nНомер армянской карты\n4318270000888915\nID bank: Zaruhi Gorbyleva\n\nРоссийская карта\n2202206844077821\nАлександр В.`;
        don.style.display = "block";
    } 
    // 4. Если это СТИХИ
    else if (d.type === "verse") {
        let title = (d.ruBook ? d.ruBook + " / " : "") + d.hyBook;
        title += " " + d.chapter + ":" + d.start + (d.end !== d.start ? "-" + d.end : "");
        ref.innerText = title;
        if (d.ru.length) { ru.innerText = d.ru.map((t,i)=>(d.start+i)+". "+t).join(" "); ru.style.display="block"; }
        if (d.hy.length) { hy.innerText = d.hy.map((t,i)=>(d.start+i)+". "+t).join(" "); hy.style.display="block"; }
    }
    
    setTimeout(autoFitText, 50);
});
</script>
</body>
</html>
